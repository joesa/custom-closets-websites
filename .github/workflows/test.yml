name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test
      - name: customSite shared-core sync
        run: npm run test:custom-site-sync
        env:
          CUSTOM_SITE_SYNC_SKIP: '1'
